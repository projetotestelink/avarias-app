services:
  - type: web
    name: avarias-app
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python -m gunicorn wsgi:app --bind 0.0.0.0:$PORT --workers 2
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: ORACLE_PASSWORD
        sync: false
      - key: ORACLE_WALLET_PASSWORD
        sync: false
