{% extends "base.html" %}
{% block title %}Início{% endblock %}
{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-8 col-lg-6 text-center">
        <img src="{{ url_for('static', filename='img/LogoLeo.png') }}" alt="Leo Madeiras" height="100" class="mb-4">
        <h1 class="display-6 fw-bold" style="color: #0B4734;">Controle de Avarias</h1>
        <p class="lead text-muted mb-4">Sistema para registro e acompanhamento de avarias no estoque</p>
        {% if current_user.is_authenticated %}
        <a href="{{ url_for('dashboard') }}" class="btn btn-lg text-white fw-bold px-5" style="background-color: #0B4734;">
            <i class="bi bi-speedometer2"></i> Ir para Dashboard
        </a>
        {% else %}
        <a href="{{ url_for('login') }}" class="btn btn-lg text-white fw-bold px-5" style="background-color: #0B4734;">
            <i class="bi bi-box-arrow-in-right"></i> Acessar o Sistema
        </a>
        {% endif %}
    </div>
</div>
{% endblock %}
